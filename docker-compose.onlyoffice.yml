services:
  backend:
    build:
      context: ./backend/OfficeWeb.API
      dockerfile: Dockerfile
    container_name: officeweb-backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Data Source=/data/officeweb.db"
      Storage__UploadPath: /data/uploads
      AllowedOrigins__0: "http://localhost:8787"
      Wopi__BaseUrl: "http://backend:8080"
      Api__BaseUrl: "http://backend:8080"
      Editors__InternalUrl: "http://onlyoffice"
      Editors__PublicUrl: "http://localhost:8081"
    volumes:
      - ./bin:/data
    networks:
      - docnet
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/documents || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: officeweb-frontend
    restart: unless-stopped
    ports:
      - "8787:80"
    depends_on:
      - backend
    networks:
      - docnet

  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: officeweb-onlyoffice
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      JWT_ENABLED: "false"
      WOPI_ENABLED: "true"
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_logs:/var/log/onlyoffice
      - onlyoffice_db:/var/lib/postgresql
      - onlyoffice_rabbitmq:/var/lib/rabbitmq
    depends_on:
      - backend
    networks:
      - docnet

volumes:
  onlyoffice_data:
  onlyoffice_logs:
  onlyoffice_db:
  onlyoffice_rabbitmq:

networks:
  docnet:
    driver: bridge
