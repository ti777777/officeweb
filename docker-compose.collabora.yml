services:
  backend:
    build:
      context: ./backend/OfficeWeb.API
      dockerfile: Dockerfile
    container_name: officeweb-backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Data Source=/data/officeweb.db"
      Storage__UploadPath: /data/uploads
      AllowedOrigins__0: "http://localhost:8787"
      Wopi__BaseUrl: "http://backend:8080"
      Api__BaseUrl: "http://backend:8080"
      Editors__InternalUrl: "http://collabora:9980"
      Editors__PublicUrl: "http://localhost:9980"
    volumes:
      - ./bin:/data
    networks:
      - docnet
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/documents || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: officeweb-frontend
    restart: unless-stopped
    ports:
      - "8787:80"
    depends_on:
      - backend
    networks:
      - docnet

  collabora:
    image: collabora/code:latest
    container_name: officeweb-collabora
    ports:
      - "9980:9980"
    environment:
      aliasgroup1: "http://backend:8080"
      DONT_GEN_SSL_CERT: "true"
      server_name: "localhost:9980"
      dictionaries: "en_US zh_TW"
      extra_params: "--o:ssl.enable=false --o:ssl.termination=false"
    cap_add:
      - MKNOD
    depends_on:
      - backend
    networks:
      - docnet

networks:
  docnet:
    driver: bridge
