services:
  backend:
    build:
      context: ./backend/OfficeWeb.API
      dockerfile: Dockerfile
    container_name: officeweb-backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Data Source=/data/officeweb.db"
      Storage__UploadPath: /data/uploads
      AllowedOrigins__0: "http://localhost"
      AllowedOrigins__1: "http://frontend"
      Wopi__BaseUrl: "http://backend:8080"
      Api__BaseUrl: "http://backend:8080"
      # WOPI-compatible editor — change these two values to switch editors
      Editors__InternalUrl: "http://collabora:9980"
      Editors__PublicUrl: "http://localhost:9980"
    volumes:
      - ./bin:/data
    networks:
      - docnet
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/documents || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: officeweb-frontend
    restart: unless-stopped
    ports:
      - "8787:80"
    depends_on:
      - backend
    networks:
      - docnet

networks:
  docnet:
    driver: bridge
